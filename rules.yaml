openrouter:
  api_key_env: OPENROUTER_API_KEY
  base_url: "https://openrouter.ai/api/v1/chat/completions"
  model: "google/gemini-2.5-flash-lite"

rules:
  potential_customer:
    min_days_between_emails: 14
  existing_customer:
    min_days_between_emails: 7
  supplier:
    min_days_between_emails: 30
  affiliate:
    min_days_between_emails: 10